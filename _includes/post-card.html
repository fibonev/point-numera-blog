<article class="post-card" data-category="{{ include.post.category }}">
  <a href="{{ include.post.url | relative_url }}" class="card-link" aria-label="{{ include.post.title }}">
    <span class="card-category">{{ include.post.category | replace: '-', ' ' | capitalize }}</span>
    <h3 class="card-title">{{ include.post.title }}</h3>
    <p class="card-excerpt">{{ include.post.excerpt | strip_html | truncatewords: 30 }}</p>
    <div class="card-meta">
      <span>{{ include.post.date | date: "%b %-d, %Y" }}</span>
      {% if include.post.read_time %}<span>{{ include.post.read_time }} min read</span>{% endif %}
    </div>
  </a>
</article>
